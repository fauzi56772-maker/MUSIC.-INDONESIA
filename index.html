<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Indonesia - Temukan Musik Favoritmu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .vinyl-spin { animation: spin 10s linear infinite; }
        .vinyl-paused { animation-play-state: paused; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes soundWave { 0%, 100% { height: 4px; } 50% { height: 28px; } }
        .wave-bar { animation: soundWave 0.5s ease-in-out infinite alternate; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen pb-32">

    <header class="sticky top-0 bg-slate-900/90 backdrop-blur-md border-b border-orange-500/30 px-6 py-4 flex justify-between items-center z-40">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-r from-orange-500 to-rose-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/20">
                <i class="fa-solid fa-radio text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-base font-black tracking-wider bg-gradient-to-r from-orange-400 to-rose-400 bg-clip-text text-transparent">MUSIC INDONESIA</h1>
                <p class="text-[10px] text-slate-400">Streaming Musik Tanpa Batas</p>
            </div>
        </div>
        
        <div class="relative w-44 sm:w-64">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-500 text-xs"></i>
            <input type="text" id="inputCari" oninput="cariLagu()" placeholder="Cari lagu atau artis..." class="w-full bg-slate-800 text-xs rounded-full pl-9 pr-4 py-2 border border-slate-700 focus:outline-none focus:border-orange-500 text-white">
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 pt-6 space-y-6">
        
        <section class="bg-gradient-to-br from-slate-900 via-purple-950/20 to-slate-900 border border-slate-800 rounded-2xl p-5 flex items-center justify-between gap-4 shadow-2xl">
            <div class="space-y-1 truncate w-2/3">
                <span class="text-[9px] bg-orange-500/20 text-orange-400 font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">Sedang Diputar</span>
                <h2 id="bannerJudul" class="text-base font-bold text-white truncate">Pilih Lagu di Bawah</h2>
                <p id="bannerArtis" class="text-xs text-slate-400 truncate">Ketuk tombol play untuk memulai</p>
            </div>
            
            <div class="relative w-24 h-24 bg-slate-950 rounded-full flex items-center justify-center border-2 border-slate-800 shadow-xl flex-shrink-0">
                <div id="piringanVinyl" class="absolute inset-1 bg-gradient-to-tr from-zinc-900 via-slate-950 to-zinc-900 rounded-full vinyl-spin vinyl-paused flex items-center justify-center">
                    <div class="w-8 h-8 bg-gradient-to-r from-orange-500 to-rose-500 rounded-full border-2 border-slate-950 flex items-center justify-center">
                        <div class="w-2 h-2 bg-slate-950 rounded-full"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="space-y-2">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Genre Populer</h3>
            <div class="flex gap-2 overflow-x-auto pb-1 text-[11px]">
                <span class="bg-orange-500 text-slate-950 font-bold px-3 py-1.5 rounded-full flex-shrink-0 cursor-pointer">Semua</span>
                <span class="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-full flex-shrink-0 text-slate-300 hover:border-orange-500">Pop Indo</span>
                <span class="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-full flex-shrink-0 text-slate-300 hover:border-orange-500">Lofi Chill</span>
                <span class="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-full flex-shrink-0 text-slate-300 hover:border-orange-500">Akustik</span>
            </div>
        </section>

        <section class="space-y-3">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-black tracking-wider text-slate-400 uppercase"><i class="fa-solid fa-list-ul text-orange-500 mr-1.5"></i> Lagu Pilihan Terbaik</h3>
                <span id="totalLagu" class="text-[10px] text-slate-500">4 Lagu Tersedia</span>
            </div>

            <div id="containerDaftarLagu" class="space-y-2">
                </div>
        </section>

    </div>

    <audio id="audioEngine" src=""></audio>

    <div id="playerBar" class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 p-4 shadow-2xl z-50 transform translate-y-full transition-transform duration-300">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            
            <div class="w-full flex items-center gap-2 text-[9px] text-slate-400 font-mono">
                <span id="waktuJalan">0:00</span>
                <div onclick="aturProgress(event)" id="barProgress" class="flex-1 bg-slate-800 h-1 rounded-full cursor-pointer relative overflow-hidden group">
                    <div id="indicatorProgress" class="bg-gradient-to-r from-orange-500 to-rose-500 h-full w-0 rounded-full"></div>
                </div>
                <span id="waktuTotal">0:00</span>
            </div>

            <div class="flex items-center justify-between gap-4">
                <div class="truncate w-1/2 flex items-center gap-2">
                    <div id="miniWave" class="flex items-end gap-0.5 h-5 flex-shrink-0 hidden">
                        <span class="w-0.5 bg-orange-500 wave-bar" style="animation-delay: 0.1s"></span>
                        <span class="w-0.5 bg-orange-500 wave-bar" style="animation-delay: 0.3s"></span>
                        <span class="w-0.5 bg-orange-500 wave-bar" style="animation-delay: 0.5s"></span>
                    </div>
                    <div class="truncate">
                        <h4 id="playerJudul" class="text-xs font-bold text-white truncate">Judul Lagu</h4>
                        <p id="playerArtis" class="text-[10px] text-slate-400 truncate">Nama Artis</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="laguSebelumnya()" class="text-slate-400 hover:text-white transition cursor-pointer"><i class="fa-solid fa-backward-step text-sm"></i></button>
                    <button onclick="toggleMainPlay()" id="btnPlayUtama" class="w-9 h-9 bg-orange-500 text-slate-950 rounded-full flex items-center justify-center hover:scale-105 transition shadow-lg shadow-orange-500/25 cursor-pointer">
                        <i class="fa-solid fa-play text-xs Regal ml-0.5"></i>
                    </button>
                    <button onclick="laguBerikutnya()" class="text-slate-400 hover:text-white transition cursor-pointer"><i class="fa-solid fa-forward-step text-sm"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Database Lagu Menggunakan Streaming Audio Server Gratis & Legal
        const databaseLagu = [
            { id: 0, judul: "Lofi Study Beats (Fokus Santai)", artis: "Chilled Waves", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { id: 1, judul: "Acoustic Sunset Piano", artis: "Instrumental ID", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { id: 2, judul: "Deep Thinking Chill", artis: "Brainwave Booster", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
            { id: 3, judul: "Midnight Coffee Ambient", artis: "Kreator Musik", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" }
        ];

        let indexLaguAktif = 0;
        let sedangMemutar = false;
        
        const audio = document.getElementById('audioEngine');
        const playBar = document.getElementById('playerBar');
        const piringan = document.getElementById('piringanVinyl');
        const btnPlayUtama = document.getElementById('btnPlayUtama');
        const miniWave = document.getElementById('miniWave');

        // Render Lagu ke Layar HP
        function muatDaftarLagu(data) {
            const container = document.getElementById('containerDaftarLagu');
            container.innerHTML = "";
            document.getElementById('totalLagu').innerText = `${data.length} Lagu Tersedia`;

            data.forEach(lagu => {
                container.innerHTML += `
                    <div id="barisLagu-${lagu.id}" onclick="putarLaguSpesifik(${lagu.id})" class="bg-slate-900 border border-slate-850 p-3.5 rounded-xl flex items-center justify-between cursor-pointer hover:bg-slate-850 transition group">
                        <div class="flex items-center gap-3 truncate">
                            <div class="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center text-slate-400 group-hover:text-orange-400 transition flex-shrink-0">
                                <i class="fa-solid fa-play text-[10px]"></i>
                            </div>
                            <div class="truncate">
                                <h4 class="text-xs font-bold text-slate-200 group-hover:text-orange-400 truncate">${lagu.judul}</h4>
                                <p class="text-[10px] text-slate-400 truncate">${lagu.artis}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 ml-2 flex-shrink-0">
                            <span class="text-[8px] bg-slate-800 border border-slate-700 text-slate-400 px-1.5 py-0.5 rounded uppercase font-bold">HQ</span>
                            <i onclick="event.stopPropagation(); this.classList.toggle('text-rose-500'); this.classList.toggle('fa-regular'); this.classList.toggle('fa-solid')" class="fa-regular fa-heart text-xs text-slate-500 hover:text-rose-500 cursor-pointer"></i>
                        </div>
                    </div>`;
            });
        }

        // Jalankan Player Musik
        function putarLaguSpesifik(id) {
            indexLaguAktif = databaseLagu.findIndex(l => l.id === id);
            const lagu = databaseLagu[indexLaguAktif];
            
            audio.src = lagu.src;
            audio.play();
            sedangMemutar = true;
            
            // Tampilkan Bar Kontrol bawah
            playBar.classList.remove('translate-y-full');
            
            document.getElementById('bannerJudul').innerText = lagu.judul;
            document.getElementById('bannerArtis').innerText = lagu.artis;
            document.getElementById('playerJudul').innerText = lagu.judul;
            document.getElementById('playerArtis').innerText = lagu.artis;

            updateEfekVisual(true);
            tandaiLaguAktif(id);
        }

        function toggleMainPlay() {
            if(audio.src === "" || audio.src === window.location.href) { putarLaguSpesifik(databaseLagu[0].id); return; }
            if(sedangMemutar) {
                audio.pause();
                sedangMemutar = false;
                updateEfekVisual(false);
            } else {
                audio.play();
                sedangMemutar = true;
                updateEfekVisual(true);
            }
        }

        function updateEfekVisual(isPlay) {
            if(isPlay) {
                piringan.classList.remove('vinyl-paused');
                btnPlayUtama.innerHTML = `<i class="fa-solid fa-pause text-xs"></i>`;
                miniWave.classList.remove('hidden');
            } else {
                piringan.classList.add('vinyl-paused');
                btnPlayUtama.innerHTML = `<i class="fa-solid fa-play text-xs ml-0.5"></i>`;
                miniWave.classList.add('hidden');
            }
        }

        function tandaiLaguAktif(id) {
            databaseLagu.forEach(l => {
                const el = document.getElementById(`barisLagu-${l.id}`);
                if(el) el.className = "bg-slate-900 border border-slate-850 p-3.5 rounded-xl flex items-center justify-between cursor-pointer hover:bg-slate-850 transition group";
            });
            const aktif = document.getElementById(`barisLagu-${id}`);
            if(aktif) aktif.className = "bg-slate-900 border-2 border-orange-500 p-3.5 rounded-xl flex items-center justify-between cursor-pointer shadow-xl shadow-orange-500/10";
        }

        function laguBerikutnya() {
            let next = indexLaguAktif + 1;
            if(next >= databaseLagu.length) next = 0;
            putarLaguSpesifik(databaseLagu[next].id);
        }

        function laguSebelumnya() {
            let prev = indexLaguAktif - 1;
            if(prev < 0) prev = databaseLagu.length - 1;
            putarLaguSpesifik(databaseLagu[prev].id);
        }

        function cariLagu() {
            const keyword = document.getElementById('inputCari').value.toLowerCase();
            const hasil = databaseLagu.filter(l => l.judul.toLowerCase().includes(keyword) || l.artis.toLowerCase().includes(keyword));
            muatDaftarLagu(hasil);
        }

        // Progress Durasi Bar Handler
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('indicatorProgress').style.width = `${progress}%`;
            
            let minJalan = Math.floor(audio.currentTime / 60);
            let detJalan = Math.floor(audio.currentTime % 60);
            if(detJalan < 10) detJalan = `0${detJalan}`;
            document.getElementById('waktuJalan').innerText = `${minJalan}:${detJalan}`;
        });

        audio.addEventListener('loadedmetadata', () => {
            let minTotal = Math.floor(audio.duration / 60);
            let detTotal = Math.floor(audio.duration % 60);
            if(detTotal < 10) detTotal = `0${detTotal}`;
            document.getElementById('waktuTotal').innerText = `${minTotal}:${detTotal}`;
        });

        function aturProgress(e) {
            const bar = document.getElementById('barProgress');
            const posisi = (e.offsetX / bar.offsetWidth);
            audio.currentTime = posisi * audio.duration;
        }

        audio.addEventListener('ended', () => { laguBerikutnya(); });

        // Mulai aplikasi musik
        muatDaftarLagu(databaseLagu);
    </script>
</body>
</html>
