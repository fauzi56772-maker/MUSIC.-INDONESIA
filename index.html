<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Indonesia - Temukan Musik Favoritmu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .vinyl-spin { animation: spin 10s linear infinite; }
        .vinyl-paused { animation-play-state: paused; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes soundWave { 0%, 100% { height: 4px; } 50% { height: 28px; } }
        .wave-bar { animation: soundWave 0.5s ease-in-out infinite alternate; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen pb-32">

    <header class="sticky top-0 bg-slate-900/90 backdrop-blur-md border-b border-orange-500/30 px-6 py-4 flex justify-between items-center z-40">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-r from-orange-500 to-rose-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/20">
                <i class="fa-solid fa-radio text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-base font-black tracking-wider bg-gradient-to-r from-orange-400 to-rose-400 bg-clip-text text-transparent">MUSIC INDONESIA</h1>
                <p class="text-[10px] text-slate-400">Streaming Musik Tanpa Batas</p>
            </div>
        </div>
        
        <div class="relative w-44 sm:w-64">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-500 text-xs"></i>
            <input type="text" id="inputCari" oninput="cariLagu()" placeholder="Cari lagu atau artis..." class="w-full bg-slate-800 text-xs rounded-full pl-9 pr-4 py-2 border border-slate-700 focus:outline-none focus:border-orange-500 text-white">
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 pt-6 space-y-6">
        
        <section class="bg-gradient-to-br from-slate-900 via-purple-950/20 to-slate-900 border border-slate-800 rounded-2xl p-5 flex items-center justify-between gap-4 shadow-2xl">
            <div class="space-y-1 truncate w-2/3">
                <span class="text-[9px] bg-orange-500/20 text-orange-400 font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">Sedang Diputar</span>
                <h2 id="bannerJudul" class="text-base font-bold text-white truncate">Pilih Lagu di Bawah</h2>
                <p id="bannerArtis" class="text-xs text-slate-400 truncate">Ketuk tombol play untuk memulai</p>
            </div>
            
            <div class="relative w-24 h-24 bg-slate-950 rounded-full flex items-center justify-center border-2 border-slate-800 shadow-xl flex-shrink-0">
                <div id="piringanVinyl" class="absolute inset-1 bg-gradient-to-tr from-zinc-900 via-slate-950 to-zinc-900 rounded-full vinyl-spin vinyl-paused flex items-center justify-center">
                    <div class="w-8 h-8 bg-gradient-to-r from-orange-500 to-rose-500 rounded-full border-2 border-slate-950 flex items-center justify-center">
                        <div class="w-2 h-2 bg-slate-950 rounded-full"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="space-y-2">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Genre Populer</h3>
            <div class="flex gap-2 overflow-x-auto pb-1 text-[11px]">
                <span class="bg-orange-500 text-slate-950 font-bold px-3 py-1.5 rounded-full flex-shrink-0 cursor-pointer">Semua</span>
                <span class="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-full flex-shrink-0 text-slate-300 hover:border-orange-500">Pop Indo</span>
                <span class="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-full flex-shrink-0 text-slate-300 hover:border-orange-500">Lofi Chill</span>
                <span class="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-full flex-shrink-0 text-slate-300 hover:border-orange-500">Akustik</span>
            </div>
        </section>

        <section class="space-y-3">
            <div class="flex justify-between items-center">
                <h3 class="text-xs font-black tracking-wider text-slate-400 uppercase"><i class="fa-solid fa-list-ul text-orange-500 mr-1.5"></i> Lagu Pilihan Terbaik</h3>
                <span id="totalLagu" class="text-[10px] text-slate-500">Loading...</span>
            </div>

            <div id="containerDaftarLagu" class="space-y-2">
                </div>
        </section>

    </div>

    <audio id="audioEngine" src=""></audio>

    <div id="playerBar" class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 p-4 shadow-2xl z-50 transform translate-y-full transition-transform duration-300">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            
            <div class="w-full flex items-center gap-2 text-[9px] text-slate-400 font-mono">
                <span id="waktuJalan">0:00</span>
                <div onclick="aturProgress(event)" id="barProgress" class="flex-1 bg-slate-800 h-1 rounded-full cursor-pointer relative overflow-hidden group">
                    <div id="indicatorProgress" class="bg-gradient-to-r from-orange-500 to-rose-500 h-full w-0 rounded-full"></div>
                </div>
                <span id="waktuTotal">0:00</span>
            </div>

            <div class="flex items-center justify-between gap-4">
                <div class="truncate w-1/2 flex items-center gap-2">
                    <div id="miniWave" class="flex items-end gap-0.5 h-5 flex-shrink-0 hidden">
                        <span class="w-0.5 bg-orange-500 wave-bar" style="animation-delay: 0.1s"></span>
                        <span class="w-0.5 bg-orange-500 wave-bar" style="animation-delay: 0.3s"></span>
                        <span class="w-0.5 bg-orange-500 wave-bar" style="animation-delay: 0.5s"></span>
                    </div>
                    <div class="truncate">
                        <h4 id="playerJudul" class="text-xs font-bold text-white truncate">Judul Lagu</h4>
                        <p id="playerArtis" class="text-[10px] text-slate-400 truncate">Nama Artis</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="laguSebelumnya()" class="text-slate-400 hover:text-white transition cursor-pointer"><i class="fa-solid fa-backward-step text-sm"></i></button>
                    <button onclick="toggleMainPlay()" id="btnPlayUtama" class="w-9 h-9 bg-orange-500 text-slate-950 rounded-full flex items-center justify-center hover:scale-105 transition shadow-lg shadow-orange-500/25 cursor-pointer">
                        <i class="fa-solid fa-play text-xs ml-0.5"></i>
                    </button>
                    <button onclick="laguBerikutnya()" class="text-slate-400 hover:text-white transition cursor-pointer"><i class="fa-solid fa-forward-step text-sm"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
